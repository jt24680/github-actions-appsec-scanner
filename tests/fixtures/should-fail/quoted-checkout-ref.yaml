name: quoted-checkout-ref
on: pull_request
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          "ref": ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - run: echo ok
