name: PowerShell Security
on:
  workflow_call:
    inputs:
      pr_base_sha:
        type: string
      pr_head_sha:
        type: string
      runner_labels:
        type: string
        default: '"ubuntu-24.04"'
      enable_psscriptanalyzer:
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  powershell:
    name: PowerShell Analysis
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check for changed PowerShell files
        id: check_ps
        env:
          PR_BASE_SHA: ${{ inputs.pr_base_sha }}
          PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
        run: |
          if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
            find . \( -name '*.ps1' -o -name '*.psm1' -o -name '*.psd1' \) -not -path './.git/*' -print0 > changed_ps_files.txt
            if [ -s changed_ps_files.txt ]; then
              echo "has_ps=true" >> "$GITHUB_OUTPUT"
              echo "No PR context — scanning all PowerShell files"
            else
              echo "has_ps=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          DIFF_FILES=$(git diff --name-only --diff-filter=d "$PR_BASE_SHA" "$PR_HEAD_SHA") || {
            echo "::warning::git diff failed — PR base SHA may be stale (force-push?). Falling back to tracked files."
            DIFF_FILES=$(git ls-files)
          }
          CHANGED_FILES=$(echo "$DIFF_FILES" | grep -E '\.(ps1|psm1|psd1)$' || echo "")

          if [ -n "$CHANGED_FILES" ]; then
            echo "has_ps=true" >> "$GITHUB_OUTPUT"
            # NUL-delimited to safely handle paths containing spaces.
          echo "$CHANGED_FILES" | tr '\n' '\0' > changed_ps_files.txt
            echo "PowerShell files changed:"
            cat changed_ps_files.txt
          else
            echo "has_ps=false" >> "$GITHUB_OUTPUT"
            echo "No PowerShell files changed in this PR"
          fi

      - name: PSScriptAnalyzer disabled
        if: steps.check_ps.outputs.has_ps == 'true' && !inputs.enable_psscriptanalyzer
        run: |
          echo '::notice title=Tool Disabled::PSScriptAnalyzer is disabled. Set enable_psscriptanalyzer: true to re-enable.'

      - name: Cache PSScriptAnalyzer
        if: steps.check_ps.outputs.has_ps == 'true' && inputs.enable_psscriptanalyzer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/powershell/Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('.github/workflows/security-powershell.yaml') }}

      - name: Run PSScriptAnalyzer
        id: run_psscriptanalyzer
        # PSScriptAnalyzer and SARIF generation are done entirely in PowerShell — no separate
        # Python conversion step, unlike other scanners in this repo.
        if: steps.check_ps.outputs.has_ps == 'true' && inputs.enable_psscriptanalyzer
        continue-on-error: true
        shell: pwsh  # Runs PowerShell Core (pwsh) on Linux — no Windows runner needed.
        run: |
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try { Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.23.0 -Force -Scope CurrentUser -ErrorAction Stop; break }
            catch { Write-Host "Attempt $i/$maxAttempts failed: $_"; if ($i -lt $maxAttempts) { Start-Sleep -Seconds 10 } else { throw } }
          }
          # Verify module version after install/cache-restore to detect cache poisoning
          $installed = Get-Module -ListAvailable -Name PSScriptAnalyzer | Select-Object -First 1
          if ($installed.Version -ne '1.23.0') {
            throw "PSScriptAnalyzer version mismatch: expected 1.23.0, got $($installed.Version)"
          }
          # NUL-delimited manifest (safe for paths with spaces); split on NUL character.
          $changedFiles = [System.IO.File]::ReadAllText('changed_ps_files.txt') -split "`0" | Where-Object { $_ -ne '' }
          $results = @()
          foreach ($file in $changedFiles) {
            if (Test-Path $file) {
              $results += Invoke-ScriptAnalyzer -Path $file -Severity Error,Warning,Information
            }
          }
          $workDir = (Get-Location).Path + [IO.Path]::DirectorySeparatorChar

          $sarif = @{
            '$schema' = 'https://json.schemastore.org/sarif-2.1.0.json'
            version = '2.1.0'
            runs = @(@{
              tool = @{
                driver = @{
                  name = 'PSScriptAnalyzer'
                  version = '1.23.0'
                }
              }
              results = @()
            })
          }

          foreach ($result in $results) {
            $level = switch ($result.Severity) {
              'Error' { 'error' }
              'Warning' { 'warning' }
              'Information' { 'note' }
              default { 'note' }
            }

            $relativePath = $result.ScriptPath
            if ($relativePath.StartsWith($workDir)) {
              $relativePath = $relativePath.Substring($workDir.Length)
            }

            $sarif.runs[0].results += @{
              ruleId = $result.RuleName
              level = $level
              message = @{ text = $result.Message }
              locations = @(@{
                physicalLocation = @{
                  artifactLocation = @{ uri = $relativePath }
                  region = @{ startLine = $result.Line }
                }
              })
            }
          }

          $sarif | ConvertTo-Json -Depth 10 | Out-File -FilePath powershell.sarif

      - name: Check PSScriptAnalyzer result
        if: steps.run_psscriptanalyzer.outcome == 'failure'
        run: echo "::warning title=PSScriptAnalyzer::PSScriptAnalyzer exited non-zero — results may be incomplete"

      - name: Validate PowerShell SARIF
        if: always() && steps.check_ps.outputs.has_ps == 'true' && inputs.enable_psscriptanalyzer
        run: |
          set -euo pipefail
          [ -s powershell.sarif ] || { echo "::error::powershell.sarif was not generated. Scanner did not produce output — check install and run steps above."; exit 1; }
          python3 -c "import json; data=json.load(open('powershell.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::powershell produced {n} finding(s)' if n else '::notice::powershell completed with no findings')"

      - name: Upload SARIF
        if: always() && steps.check_ps.outputs.has_ps == 'true' && inputs.enable_psscriptanalyzer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: powershell-sarif
          path: powershell.sarif
          retention-days: 7
