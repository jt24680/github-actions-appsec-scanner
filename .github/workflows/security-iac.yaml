      - name: Run Pluto
        id: run_pluto
        if: steps.check_k8s.outputs.has_k8s == 'true' && inputs.enable_pluto
        # Pluto exits 3 when deprecated APIs are found, 0 when clean.
        # continue-on-error prevents the job from failing when findings exist.
        continue-on-error: true
        run: |
          # Default target K8s version. Update this value when the team's minimum
          # supported K8s version changes (e.g., after a cluster upgrade).
          PLUTO_EXIT=0
          pluto detect-files -d . --output json --target-versions k8s=v1.31.0 > pluto.json 2>pluto.stderr || PLUTO_EXIT=$?

          # Pluto exits 3 when findings exist; only treat other codes as execution failures.
          if [ "$PLUTO_EXIT" -ne 0 ] && [ "$PLUTO_EXIT" -ne 3 ]; then
            echo "::error::pluto failed with exit code $PLUTO_EXIT"
            if [ -s pluto.stderr ]; then
              sed -n '1,20p' pluto.stderr
            fi
            exit "$PLUTO_EXIT"
          fi

          [ -s pluto.json ] || { echo "::error::pluto produced no JSON output."; exit 1; }
          python3 -c "import json; json.load(open('pluto.json'))" >/dev/null 2>&1 || {
            echo "::error::pluto produced malformed JSON output."
            exit 1
          }

      - name: Check Pluto result
        if: steps.run_pluto.outcome == 'failure'
        run: echo "::warning title=Pluto::Pluto exited non-zero — results may be incomplete"

      - name: Convert to SARIF
        if: steps.check_k8s.outputs.has_k8s == 'true' && inputs.enable_pluto && steps.run_pluto.outcome != 'failure'
        run: |
          python3 << 'PYEOF'
          import json

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "Pluto",
                          "version": "5.23.0",
                          "informationUri": "https://github.com/FairwindsOps/pluto"
                      }
                  },
                  "results": []
              }]
          }

          try:
              with open("pluto.json") as f:
                  data = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError) as e:
              print(f"Warning: could not parse pluto.json: {e}")
              data = {"items": []}

          items = data if isinstance(data, list) else data.get("items", [])

          for item in items:
              api = item.get("api", {})
              name = item.get("name", "unknown")
              filepath = item.get("filePath", item.get("filepath", "unknown"))
              api_version = api.get("version", "unknown")
              kind = item.get("kind", api.get("kind", "unknown"))
              deprecated_in = api.get("deprecated-in", "unknown")
              removed_in = api.get("removed-in", "unknown")
              replacement = api.get("replacement-api", "none")

              # deprecated-but-not-removed -> warning; removed -> error
              is_removed = removed_in != "unknown" and removed_in != ""
              level = "error" if is_removed else "warning"

              if is_removed:
                  msg = (f"{kind} '{name}' uses deprecated API version {api_version}. "
                         f"Deprecated in {deprecated_in}, removed in {removed_in}. "
                         f"Replace with: {replacement}")
              else:
                  msg = (f"{kind} '{name}' uses deprecated API version {api_version}. "
                         f"Deprecated in {deprecated_in}. "
                         f"Replace with: {replacement}")

              result = {
                  "ruleId": "pluto/deprecated-api",
                  "level": level,
                  "message": {"text": msg},
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": filepath},
                          "region": {"startLine": 1}
                      }
                  }]
              }
              sarif["runs"][0]["results"].append(result)

          with open("pluto.sarif", "w") as f:
              json.dump(sarif, f, indent=2)
          PYEOF

      - name: Validate Pluto SARIF
        if: always() && steps.check_k8s.outputs.has_k8s == 'true' && inputs.enable_pluto
        run: |
          set -euo pipefail
          [ "${{ steps.run_pluto.outcome }}" != "failure" ] || { echo "::error::pluto failed before producing reliable SARIF output."; exit 1; }
          [ -s pluto.sarif ] || { echo "::error::pluto.sarif was not generated. Scanner did not produce output — check install and run steps above."; exit 1; }
          python3 -c "import json; data=json.load(open('pluto.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::pluto produced {n} finding(s)' if n else '::notice::pluto completed with no findings')"

      - name: Upload SARIF
        if: always() && steps.check_k8s.outputs.has_k8s == 'true' && inputs.enable_pluto
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pluto-sarif
          path: pluto.sarif
          retention-days: 7
