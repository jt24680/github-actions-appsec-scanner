name: Python Security
on:
  workflow_call:
    inputs:
      pr_base_sha:
        type: string
      pr_head_sha:
        type: string
      runner_labels:
        type: string
        default: '"ubuntu-24.04"'
      enable_bandit:
        type: boolean
        default: true
      enable_pip_audit:
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check for changed Python files
        id: check_python
        uses: ./.github/actions/collect-paths
        with:
          output: changed_python_files.txt
          label: Python
          include-regex: '\.py$'
          exclude-regex: '(^|/)node_modules/'
          base-sha: ${{ inputs.pr_base_sha }}
          head-sha: ${{ inputs.pr_head_sha }}

      # When the orchestrator routes us on config-only changes (.bandit, bandit.yml),
      # collect-paths finds no .py files. Fall back to scanning all tracked .py files
      # since config changes affect the entire scan.
      - name: Config-only fallback
        id: config_fallback
        if: steps.check_python.outputs.has_files == 'false'
        run: |
          git ls-files -z '*.py' > changed_python_files.txt || true
          if [ -s changed_python_files.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Bandit config changed — scanning all tracked Python files"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bandit disabled
        if: (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && !inputs.enable_bandit
        run: |
          echo '::notice title=Tool Disabled::Bandit is disabled. Set enable_bandit: true to re-enable.'

      - name: Set up Python
        if: (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && inputs.enable_bandit
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Cache Bandit
        if: (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && inputs.enable_bandit
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit-${{ hashFiles('.github/workflows/security-python.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-bandit-

      - name: Install Bandit
        if: (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && inputs.enable_bandit
        run: |
          for i in 1 2 3; do
            pip install bandit==1.8.3 && break
            [ "$i" -lt 3 ] || { echo "::error::Failed to install Bandit after 3 attempts"; exit 1; }
            echo "Attempt $i/3 failed, retrying in 10s..."
            sleep 10
          done

      - name: Run Bandit
        id: run_bandit
        if: (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && inputs.enable_bandit
        continue-on-error: true
        run: |
          # Process files in batches to avoid ARG_MAX limits on large repos.
          # Each batch writes to a numbered temp file; results are merged afterward.
          # '|| true' prevents a non-zero bandit exit code (findings exist) from failing the step.
          mkdir -p "$RUNNER_TEMP/bandit-parts"
          mkdir -p "$RUNNER_TEMP/bandit-results"
          BATCH=0
          BATCH_SIZE=0
          while IFS= read -r -d '' line; do
            BATCH_FILE="$RUNNER_TEMP/bandit-parts/batch_${BATCH}.txt"
            printf '%s\0' "$line" >> "$BATCH_FILE"
            BATCH_SIZE=$((BATCH_SIZE + 1))
            if [ "$BATCH_SIZE" -ge 500 ]; then
              BATCH=$((BATCH + 1))
              BATCH_SIZE=0
            fi
          done < changed_python_files.txt

          for batch in "$RUNNER_TEMP"/bandit-parts/batch_*.txt; do
            [ -e "$batch" ] || continue
            IDX=$(basename "$batch" .txt)
            xargs -0 bandit -r -f json -o "$RUNNER_TEMP/bandit-results/${IDX}.json" -- < "$batch" || true
          done

          # Merge all batch results into a single JSON file.
          python3 -c "
          import json, glob, sys, os
          results_dir = os.path.join(os.environ['RUNNER_TEMP'], 'bandit-results')
          files = sorted(glob.glob(os.path.join(results_dir, '*.json')))
          if not files:
              print('::warning::No Bandit output files found — scanner may have failed')
              sys.exit(1)
          merged = {'results': [], 'errors': [], 'metrics': {}}
          drop_count = 0
          for f in files:
              try:
                  with open(f) as fh:
                      data = json.load(fh)
                  merged['results'].extend(data.get('results', []))
                  merged['errors'].extend(data.get('errors', []))
              except (json.JSONDecodeError, KeyError) as e:
                  drop_count += 1
                  print(f'::warning::Failed to parse Bandit batch {f}: {e}')
          if drop_count > 0:
              print(f'::warning::{drop_count} Bandit batch(es) failed to parse')
          if drop_count == len(files):
              print('::error::All Bandit batches failed to parse')
              sys.exit(1)
          with open('bandit.json', 'w') as fh:
              json.dump(merged, fh, indent=2)
          "

      - name: Check Bandit result
        if: steps.run_bandit.outcome == 'failure'
        run: echo "::warning title=Bandit::Bandit exited non-zero — results may be incomplete"

      - name: Convert to SARIF
        if: always() && steps.run_bandit.outcome != 'failure' && (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && inputs.enable_bandit
        run: |
          python3 << 'EOF'
          import json

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "Bandit",
                          "version": "1.8.3",
                          "informationUri": "https://bandit.readthedocs.io/"
                      }
                  },
                  "results": []
              }]
          }

          try:
              with open('bandit.json', 'r') as f:
                  data = json.load(f)

              severity_map = {
                  'HIGH': 'error',
                  'MEDIUM': 'warning',
                  'LOW': 'note'
              }

              for result in data.get('results', []):
                  test_id = result.get('test_id', 'unknown')
                  test_name = result.get('test_name', '')
                  severity = result.get('issue_severity', 'MEDIUM')
                  confidence = result.get('issue_confidence', 'MEDIUM')
                  issue_text = result.get('issue_text', 'No description')
                  filename = result.get('filename', 'unknown')
                  line_number = result.get('line_number', 1)
                  col_offset = result.get('col_offset', 1)

                  message = f"[{test_id}:{test_name}] {issue_text} (severity: {severity}, confidence: {confidence})"

                  sarif_result = {
                      "ruleId": test_id,
                      "level": severity_map.get(severity, 'warning'),
                      "message": {"text": message},
                      "locations": [{
                          "physicalLocation": {
                              "artifactLocation": {"uri": filename},
                              "region": {"startLine": line_number, "startColumn": col_offset or 1}
                          }
                      }]
                  }
                  sarif["runs"][0]["results"].append(sarif_result)
          except Exception as e:
              raise SystemExit(f"Error processing Bandit results: {e}")

          with open('bandit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          EOF

      - name: Validate Bandit SARIF
        if: always() && (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && inputs.enable_bandit
        run: |
          set -euo pipefail
          [ -s bandit.sarif ] || { echo "::error::bandit.sarif was not generated. Scanner did not produce output — check install and run steps above."; exit 1; }
          python3 -c "import json; data=json.load(open('bandit.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::bandit produced {n} finding(s)' if n else '::notice::bandit completed with no findings')"

      - name: Upload SARIF
        if: always() && (steps.check_python.outputs.has_files == 'true' || steps.config_fallback.outputs.has_files == 'true') && inputs.enable_bandit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bandit-sarif
          path: bandit.sarif
          retention-days: 7

  pip-audit:
    name: pip-audit (Python Dependencies)
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # Uses inline Python rather than collect-paths: must resolve project roots per
      # package manager (requirements.txt, pyproject.toml, Pipfile, poetry.lock, etc.)
      # and determine the correct audit strategy per project. collect-paths handles
      # only changed-file path filtering, not manifest discovery or project layout.
      - name: Check for dependency file changes
        id: check_deps
        env:
          PR_BASE_SHA: ${{ inputs.pr_base_sha }}
          PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
        run: |
          python3 << 'PY'
          from pathlib import Path
          import os
          import subprocess

          repo_root = Path(".")
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          base_sha = os.environ.get("PR_BASE_SHA", "")
          head_sha = os.environ.get("PR_HEAD_SHA", "")
          dep_names = {"Pipfile", "Pipfile.lock", "pyproject.toml", "setup.cfg", "poetry.lock", "uv.lock", "pdm.lock"}

          def repo_rel(path: Path) -> str:
              rel = path.as_posix().lstrip("./")
              return rel or "."

          def is_dep_file(path: Path) -> bool:
              return (
                  path.name.startswith("requirements") and path.suffix == ".txt"
              ) or path.name in dep_names

          if not base_sha or not head_sha:
              dep_files = [
                  repo_rel(path)
                  for path in repo_root.rglob("*")
                  if path.is_file() and ".git" not in path.parts and is_dep_file(path)
              ]
          else:
              try:
                  diff = subprocess.check_output(
                      ["git", "diff", "--name-only", "--diff-filter=d", "-z", base_sha, head_sha],
                  )
              except subprocess.CalledProcessError:
                  diff = subprocess.check_output(["git", "ls-files", "-z"])
              dep_files = []
              for raw_path in diff.split(b"\0"):
                  if not raw_path:
                      continue
                  line = raw_path.decode("utf-8", "surrogateescape")
                  rel_path = Path(line)
                  if is_dep_file(rel_path):
                      dep_files.append(repo_rel(rel_path))

          dep_files = sorted(set(dep_files))
          with open("changed_dep_files.txt", "w", encoding="utf-8") as handle:
              for dep_file in dep_files:
                  handle.write(dep_file + "\n")

          targets = []
          project_dirs = {}
          for dep_file in dep_files:
              dep_path = Path(dep_file)
              if dep_path.name.startswith("requirements") and dep_path.suffix == ".txt":
                  targets.append(("requirements", dep_file, dep_path.name))
                  continue
              project_dir = repo_rel(dep_path.parent)
              project_dirs.setdefault(project_dir, set()).add(dep_path.name)

          for project_dir, names in sorted(project_dirs.items()):
              project_path = repo_root if project_dir == "." else repo_root / project_dir
              if "pyproject.toml" in names or ("poetry.lock" in names and (project_path / "pyproject.toml").is_file()):
                  targets.append(("project", project_dir, "pyproject.toml"))
              elif "Pipfile" in names or "Pipfile.lock" in names:
                  targets.append(("project", project_dir, "Pipfile"))
              elif "setup.cfg" in names:
                  targets.append(("project", project_dir, "setup.cfg"))
              elif "poetry.lock" in names:
                  targets.append(("project", project_dir, "poetry.lock"))
              elif "uv.lock" in names:
                  print(f"::warning::Found uv.lock in {project_dir} — pip-audit does not support uv lockfile format. No dependency audit for this project.")
              elif "pdm.lock" in names:
                  print(f"::warning::Found pdm.lock in {project_dir} — pip-audit does not support pdm lockfile format. No dependency audit for this project.")

          with open("pip-audit-targets.txt", "w", encoding="utf-8") as handle:
              for target_type, target_path, target_kind in targets:
                  handle.write(f"{target_type}|{target_path}|{target_kind}\n")

          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"has_deps={'true' if targets else 'false'}\n")

          if targets:
              print("pip-audit targets:")
              for target_type, target_path, target_kind in targets:
                  print(f"{target_type}: {target_path} ({target_kind})")
          else:
              print("No Python dependency files matched this run")
          PY

      - name: pip-audit disabled
        if: steps.check_deps.outputs.has_deps == 'true' && !inputs.enable_pip_audit
        run: |
          echo '::notice title=Tool Disabled::pip-audit is disabled. Set enable_pip_audit: true to re-enable.'

      - name: Set up Python
        if: steps.check_deps.outputs.has_deps == 'true' && inputs.enable_pip_audit
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Cache pip-audit
        if: steps.check_deps.outputs.has_deps == 'true' && inputs.enable_pip_audit
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit-${{ hashFiles('.github/workflows/security-python.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-audit-

      - name: Install pip-audit
        if: steps.check_deps.outputs.has_deps == 'true' && inputs.enable_pip_audit
        run: |
          for i in 1 2 3; do
            pip install pip-audit==2.9.0 pip-tools && break
            [ "$i" -lt 3 ] || { echo "::error::Failed to install pip-audit after 3 attempts"; exit 1; }
            echo "Attempt $i/3 failed, retrying in 10s..."
            sleep 10
          done

      - name: Run pip-audit
        id: run_pip_audit
        if: steps.check_deps.outputs.has_deps == 'true' && inputs.enable_pip_audit
        continue-on-error: true
        run: |
          echo '[]' > pip-audit-aggregated.json
          targets_found=0
          successful_runs=0
          failed_targets=0
          while IFS='|' read -r target_type target_path target_kind; do
            [ -n "$target_type" ] || continue
            targets_found=$((targets_found + 1))
            source_file="$target_path"
            export_mode=false
            rm -f pip-audit-partial.json pip-audit-tmp-reqs.txt

            if [ "$target_type" = "requirements" ]; then
              echo "Auditing requirements file $target_path..."
              pip-audit -r "$target_path" --format json --output pip-audit-partial.json 2>/dev/null || true
            elif [ "$target_kind" = "pyproject.toml" ]; then
              echo "Auditing Python project at $target_path via pyproject.toml..."
              source_file="${target_path%/}/pyproject.toml"
              [ "$target_path" = "." ] && source_file="pyproject.toml"
              # Try direct project audit first; fall back to pip-compile for non-installable projects.
              if ! pip-audit "$target_path" --format json --output pip-audit-partial.json 2>/dev/null; then
                echo "::notice::pip-audit direct install failed for $source_file — trying pip-compile fallback"
                if pip-compile --quiet --output-file=pip-audit-tmp-reqs.txt "$source_file" 2>/dev/null; then
                  export_mode=true
                else
                  echo "::warning::pip-compile also failed for $source_file — no audit results for this target"
                fi
              fi
            elif [ "$target_kind" = "Pipfile" ]; then
              echo "Auditing Python project at $target_path via Pipfile..."
              source_file="${target_path%/}/Pipfile"
              [ "$target_path" = "." ] && source_file="Pipfile"
              if command -v pipenv >/dev/null 2>&1; then
                (cd "$target_path" && pipenv requirements 2>/dev/null) > pip-audit-tmp-reqs.txt && export_mode=true || true
              elif [ -f "$target_path/Pipfile.lock" ] || { [ "$target_path" = "." ] && [ -f "Pipfile.lock" ]; }; then
                TARGET_PATH="$target_path" python3 -c "
          import json
          import os
          from pathlib import Path
          lock_path = Path(os.environ['TARGET_PATH']) / 'Pipfile.lock'
          with open(lock_path) as f:
              lock = json.load(f)
          for section in ('default', 'develop'):
              for pkg, info in lock.get(section, {}).items():
                  ver = info.get('version', '')
                  print(f'{pkg}{ver}')
          " > pip-audit-tmp-reqs.txt 2>/dev/null && export_mode=true || true
              fi
            elif [ "$target_kind" = "setup.cfg" ]; then
              echo "Auditing Python project at $target_path via setup.cfg..."
              source_file="${target_path%/}/setup.cfg"
              [ "$target_path" = "." ] && source_file="setup.cfg"
              if command -v pip-compile >/dev/null 2>&1; then
                pip-compile --quiet --output-file=pip-audit-tmp-reqs.txt "$source_file" 2>/dev/null && export_mode=true || true
              fi
            elif [ "$target_kind" = "poetry.lock" ]; then
              echo "Auditing Python project at $target_path via poetry.lock..."
              source_file="${target_path%/}/poetry.lock"
              [ "$target_path" = "." ] && source_file="poetry.lock"
              if command -v poetry >/dev/null 2>&1; then
                (cd "$target_path" && poetry export -f requirements.txt --without-hashes 2>/dev/null) > pip-audit-tmp-reqs.txt && export_mode=true || true
              fi
            fi

            if [ "$export_mode" = true ]; then
              pip-audit -r pip-audit-tmp-reqs.txt --format json --output pip-audit-partial.json 2>/dev/null || true
            fi

            if [ -s pip-audit-partial.json ]; then
              successful_runs=$((successful_runs + 1))
              REQ_FILE="$source_file" python3 << 'PYEOF'
          import json, os
          with open('pip-audit-aggregated.json') as f:
              existing = json.load(f)
          with open('pip-audit-partial.json') as f:
              new = json.load(f)
          deps = new.get('dependencies', []) if isinstance(new, dict) else new
          source = os.environ['REQ_FILE']
          for dep in deps:
              dep['_source_file'] = source
          existing.extend(deps)
          with open('pip-audit-aggregated.json', 'w') as f:
              json.dump(existing, f)
          PYEOF
            else
              echo "::error title=pip-audit::Failed to audit $source_file"
              failed_targets=$((failed_targets + 1))
            fi
            rm -f pip-audit-partial.json pip-audit-tmp-reqs.txt
          done < pip-audit-targets.txt

          if [ "$targets_found" -gt 0 ] && [ "$successful_runs" -eq 0 ]; then
            echo "::error::pip-audit found $targets_found target(s) but all invocations failed"
            exit 1
          fi

          # Move aggregated results before checking for partial failures so that
          # successful audit data is preserved even when some targets fail.
          mv pip-audit-aggregated.json pip-audit.json

          [ "$failed_targets" -eq 0 ] || exit 1

      - name: Check pip-audit result
        if: steps.run_pip_audit.outcome == 'failure'
        run: echo "::warning title=pip-audit::pip-audit exited non-zero — results may be incomplete"

      - name: Convert to SARIF
        if: always() && steps.run_pip_audit.outcome != 'failure' && steps.check_deps.outputs.has_deps == 'true' && inputs.enable_pip_audit
        run: |
          python3 << 'EOF'
          import json

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "pip-audit",
                          "version": "2.9.0",
                          "informationUri": "https://pypi.org/project/pip-audit/"
                      }
                  },
                  "results": []
              }]
          }

          try:
              with open('pip-audit.json', 'r') as f:
                  deps = json.load(f)

              for dep in deps:
                  vulns = dep.get('vulns', [])
                  if not vulns:
                      continue

                  pkg_name = dep.get('name', 'unknown')
                  pkg_version = dep.get('version', 'unknown')
                  source_file = dep.get('_source_file', 'requirements.txt')

                  for vuln in vulns:
                      vuln_id = vuln.get('id', 'unknown')
                      fix_versions = vuln.get('fix_versions', [])
                      description = vuln.get('description', 'Vulnerable dependency detected')

                      message = f"Vulnerable package: {pkg_name}=={pkg_version} ({vuln_id})"
                      if fix_versions:
                          message += f". Fix available: {', '.join(fix_versions)}"

                      # pip-audit JSON does not expose advisory severity;
                      # default to warning (conservative) instead of error.
                      result = {
                          "ruleId": vuln_id,
                          "level": "warning",
                          "message": {"text": message},
                          "locations": [{
                              "physicalLocation": {
                                  "artifactLocation": {"uri": source_file},
                                  "region": {"startLine": 1}
                              }
                          }]
                      }
                      sarif["runs"][0]["results"].append(result)
          except Exception as e:
              raise SystemExit(f"Error processing pip-audit results: {e}")

          with open('pip-audit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          EOF

      - name: Validate pip-audit SARIF
        if: always() && steps.check_deps.outputs.has_deps == 'true' && inputs.enable_pip_audit
        run: |
          set -euo pipefail
          [ -s pip-audit.sarif ] || { echo "::error::pip-audit.sarif was not generated. Scanner did not produce output — check install and run steps above."; exit 1; }
          python3 -c "import json; data=json.load(open('pip-audit.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::pip-audit produced {n} finding(s)' if n else '::notice::pip-audit completed with no findings')"

      - name: Upload SARIF
        if: always() && steps.check_deps.outputs.has_deps == 'true' && inputs.enable_pip_audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pip-audit-sarif
          path: pip-audit.sarif
          retention-days: 7
