name: .NET Security
on:
  workflow_call:
    inputs:
      pr_base_sha:
        type: string
      pr_head_sha:
        type: string
      runner_labels:
        type: string
        default: '"ubuntu-24.04"'
      enable_dotnet_audit:
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  dotnet-vulnerable-packages:
    name: .NET Vulnerable Packages (${{ matrix.dotnet-version }})
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x']
      fail-fast: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check for changed .NET files
        id: check_dotnet
        env:
          PR_BASE_SHA: ${{ inputs.pr_base_sha }}
          PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
        run: |
          if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
            echo "has_dotnet=true" >> "$GITHUB_OUTPUT"
            echo "No PR context — scanning all .NET files"
            exit 0
          fi
          DIFF_FILES=$(git diff --name-only --diff-filter=d "$PR_BASE_SHA" "$PR_HEAD_SHA") || {
            echo "::warning::git diff failed — PR base SHA may be stale (force-push?). Falling back to tracked files."
            DIFF_FILES=$(git ls-files)
          }
          CHANGED_FILES=$(echo "$DIFF_FILES" | grep -E '\.(csproj|fsproj|vbproj|sln|cs|fs|vb)$|Directory\.Packages\.props$' || echo "")

          if [ -n "$CHANGED_FILES" ]; then
            echo "has_dotnet=true" >> "$GITHUB_OUTPUT"
            echo ".NET files changed:"
            echo "$CHANGED_FILES"
          else
            echo "has_dotnet=false" >> "$GITHUB_OUTPUT"
            echo "No .NET files changed in this PR"
          fi

      - name: dotnet audit disabled
        if: steps.check_dotnet.outputs.has_dotnet == 'true' && !inputs.enable_dotnet_audit
        run: |
          echo '::notice title=Tool Disabled::dotnet audit is disabled. Set enable_dotnet_audit: true to re-enable.'

      - name: Discover .NET scan targets
        id: dotnet_targets
        if: steps.check_dotnet.outputs.has_dotnet == 'true' && inputs.enable_dotnet_audit
        run: |
          find . -type f -name '*.sln' -not -path './.git/*' | sort > dotnet-targets.txt
          if [ ! -s dotnet-targets.txt ]; then
            find . -type f \( -name '*.csproj' -o -name '*.fsproj' -o -name '*.vbproj' \) -not -path './.git/*' | sort > dotnet-targets.txt
          fi

          if [ -s dotnet-targets.txt ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "Discovered .NET scan targets:"
            cat dotnet-targets.txt
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Detected .NET file changes but found no solution or project files to scan."
            if find . -name 'packages.config' -not -path './.git/*' 2>/dev/null | grep -q .; then
              echo "::warning::Found packages.config (legacy NuGet format). dotnet audit only supports PackageReference — consider migrating."
            fi
          fi

      - name: Set up .NET
        if: steps.check_dotnet.outputs.has_dotnet == 'true' && steps.dotnet_targets.outputs.has_targets == 'true' && inputs.enable_dotnet_audit
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Set up Python
        if: steps.check_dotnet.outputs.has_dotnet == 'true' && steps.dotnet_targets.outputs.has_targets == 'true' && inputs.enable_dotnet_audit
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Restore dependencies
        id: dotnet_restore
        if: steps.check_dotnet.outputs.has_dotnet == 'true' && steps.dotnet_targets.outputs.has_targets == 'true' && inputs.enable_dotnet_audit
        run: |
          : > dotnet-restored-targets.txt
          while IFS= read -r target; do
            [ -n "$target" ] || continue
            if dotnet restore "$target"; then
              echo "$target" >> dotnet-restored-targets.txt
            else
              echo "::warning::dotnet restore failed for $target"
            fi
          done < dotnet-targets.txt

          if [ -s dotnet-restored-targets.txt ]; then
            echo "restored_any=true" >> "$GITHUB_OUTPUT"
          else
            echo "restored_any=false" >> "$GITHUB_OUTPUT"
            echo "::error::dotnet restore failed for every discovered solution/project."
            exit 1
          fi

      - name: Check for vulnerable packages
        id: run_dotnet_audit
        if: steps.check_dotnet.outputs.has_dotnet == 'true' && steps.dotnet_restore.outputs.restored_any == 'true' && inputs.enable_dotnet_audit
        continue-on-error: true
        run: |
          echo '{"projects":[]}' > vulnerable-packages.json
          targets_found=0
          successful_runs=0
          while IFS= read -r target; do
            [ -n "$target" ] || continue
            targets_found=$((targets_found + 1))
            dotnet list "$target" package --vulnerable --include-transitive --format json > vulnerable-packages-partial.json || true
            if [ -s vulnerable-packages-partial.json ]; then
              successful_runs=$((successful_runs + 1))
              python3 << 'EOF'
          import json

          with open('vulnerable-packages.json', 'r') as f:
              merged = json.load(f)
          with open('vulnerable-packages-partial.json', 'r') as f:
              partial = json.load(f)

          merged.setdefault('projects', []).extend(partial.get('projects', []))

          with open('vulnerable-packages.json', 'w') as f:
              json.dump(merged, f)
          EOF
              rm -f vulnerable-packages-partial.json
            else
              rm -f vulnerable-packages-partial.json
            fi
          done < dotnet-restored-targets.txt

          if [ "$targets_found" -gt 0 ] && [ "$successful_runs" -eq 0 ]; then
            echo "::error::dotnet audit found $targets_found target(s) but all invocations failed — check dotnet availability"
            exit 1
          fi

      - name: Check dotnet audit result
        if: steps.run_dotnet_audit.outcome == 'failure'
        run: echo "::warning title=dotnet audit::dotnet audit exited non-zero — results may be incomplete"

      - name: Convert to SARIF
        if: always() && steps.check_dotnet.outputs.has_dotnet == 'true' && steps.dotnet_restore.outputs.restored_any == 'true' && inputs.enable_dotnet_audit && steps.run_dotnet_audit.outcome != 'failure'
        run: |
          python3 << 'EOF'
          import json

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "dotnet-vulnerable-packages",
                          "informationUri": "https://learn.microsoft.com/en-us/nuget/concepts/auditing-packages"
                      }
                  },
                  "results": []
              }]
          }

          try:
              with open('vulnerable-packages.json', 'r') as f:
                  data = json.load(f)

              for project in data.get('projects', []):
                  project_path = project.get('path', 'unknown')

                  for framework in project.get('frameworks', []):
                      all_packages = framework.get('topLevelPackages', []) + framework.get('transitivePackages', [])

                      for vuln_pkg in all_packages:
                          if not vuln_pkg.get('vulnerabilities'):
                              continue

                          pkg_name = vuln_pkg.get('id', 'unknown')
                          pkg_version = vuln_pkg.get('resolvedVersion', 'unknown')

                          for vuln in vuln_pkg.get('vulnerabilities', []):
                              severity_map = {
                                  'Critical': 'error',
                                  'High': 'error',
                                  'Moderate': 'warning',
                                  'Medium': 'warning',
                                  'Low': 'note'
                              }

                              severity = vuln.get('severity', 'Moderate')
                              advisory_url = vuln.get('advisoryUrl', '')

                              message = f"Vulnerable package: {pkg_name} {pkg_version} - {severity} severity"
                              if advisory_url:
                                  message += f". See: {advisory_url}"

                              result = {
                                  "ruleId": f"nuget-vulnerability-{severity.lower()}",
                                  "level": severity_map.get(severity, 'warning'),
                                  "message": {"text": message},
                                  "locations": [{
                                      "physicalLocation": {
                                          "artifactLocation": {"uri": project_path},
                                          "region": {"startLine": 1}
                                      }
                                  }],
                                  "properties": {
                                      "package": pkg_name,
                                      "version": pkg_version,
                                      "advisory": advisory_url
                                  }
                              }
                              sarif["runs"][0]["results"].append(result)
          except Exception as e:
              raise SystemExit(f"Error processing vulnerable packages: {e}")

          with open('dotnet-vulnerable.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          EOF

      - name: Validate .NET SARIF
        if: always() && steps.check_dotnet.outputs.has_dotnet == 'true' && steps.dotnet_restore.outputs.restored_any == 'true' && inputs.enable_dotnet_audit
        run: |
          set -euo pipefail
          [ -s dotnet-vulnerable.sarif ] || { echo "::error::dotnet-vulnerable.sarif was not generated. Scanner did not produce output — check install and run steps above."; exit 1; }
          python3 -c "import json; data=json.load(open('dotnet-vulnerable.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::dotnet-vulnerable produced {n} finding(s)' if n else '::notice::dotnet-vulnerable completed with no findings')"

      - name: Upload SARIF
        if: always() && steps.check_dotnet.outputs.has_dotnet == 'true' && steps.dotnet_restore.outputs.restored_any == 'true' && inputs.enable_dotnet_audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dotnet-vulnerable-sarif-${{ matrix.dotnet-version }}
          path: dotnet-vulnerable.sarif
          retention-days: 7
