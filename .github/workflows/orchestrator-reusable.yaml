    uses: ./.github/workflows/security-powershell.yaml
    with:
      pr_base_sha: ${{ inputs.pr_base_sha }}
      pr_head_sha: ${{ inputs.pr_head_sha }}
      runner_labels: ${{ needs.detect.outputs.runner_labels }}
      enable_psscriptanalyzer: ${{ needs.detect.outputs.enable_psscriptanalyzer == 'true' }}

  iac:
    needs: [detect]
    if: needs.detect.outputs.has_iac == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/security-iac.yaml
    with:
      pr_base_sha: ${{ inputs.pr_base_sha }}
      pr_head_sha: ${{ inputs.pr_head_sha }}
      runner_labels: ${{ needs.detect.outputs.runner_labels }}
      enable_checkov: ${{ needs.detect.outputs.enable_checkov == 'true' }}
      enable_ansible_lint: ${{ needs.detect.outputs.enable_ansible_lint == 'true' }}
      enable_terraform_validate: ${{ needs.detect.outputs.enable_terraform_validate == 'true' }}
      enable_terraform_fmt: ${{ needs.detect.outputs.enable_terraform_fmt == 'true' }}
      enable_tflint: ${{ needs.detect.outputs.enable_tflint == 'true' }}
      enable_kube_linter: ${{ needs.detect.outputs.enable_kube_linter == 'true' }}
      enable_hadolint: ${{ needs.detect.outputs.enable_hadolint == 'true' }}
      enable_kubescape: ${{ needs.detect.outputs.enable_kubescape == 'true' }}
      enable_pluto: ${{ needs.detect.outputs.enable_pluto == 'true' }}
      has_terraform: ${{ needs.detect.outputs.has_terraform == 'true' }}
      has_dockerfile: ${{ needs.detect.outputs.has_dockerfile == 'true' }}
      has_kubernetes: ${{ needs.detect.outputs.has_kubernetes == 'true' }}
      has_ansible: ${{ needs.detect.outputs.has_ansible == 'true' }}

  c:
    needs: [detect]
    if: needs.detect.outputs.has_c == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/security-c.yaml
    with:
      pr_base_sha: ${{ inputs.pr_base_sha }}
      pr_head_sha: ${{ inputs.pr_head_sha }}
      runner_labels: ${{ needs.detect.outputs.runner_labels }}
      enable_flawfinder: ${{ needs.detect.outputs.enable_flawfinder == 'true' }}
      enable_cppcheck: ${{ needs.detect.outputs.enable_cppcheck == 'true' }}
      enable_semgrep_c: ${{ needs.detect.outputs.enable_semgrep_c == 'true' }}

  php:
    needs: [detect]
    if: needs.detect.outputs.has_php == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/security-php.yaml
    with:
      pr_base_sha: ${{ inputs.pr_base_sha }}
      pr_head_sha: ${{ inputs.pr_head_sha }}
      runner_labels: ${{ needs.detect.outputs.runner_labels }}
      enable_phpstan: ${{ needs.detect.outputs.enable_phpstan == 'true' }}
      enable_composer_audit: ${{ needs.detect.outputs.enable_composer_audit == 'true' }}

  general:
    needs: [detect]
    permissions:
      contents: read
    uses: ./.github/workflows/_security-general.yaml
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    with:
      pr_base_sha: ${{ inputs.pr_base_sha }}
      pr_head_sha: ${{ inputs.pr_head_sha }}
      runner_labels: ${{ needs.detect.outputs.runner_labels }}
      enable_semgrep: ${{ needs.detect.outputs.enable_semgrep == 'true' }}
      enable_trivy: ${{ needs.detect.outputs.enable_trivy == 'true' }}
      enable_trufflehog: ${{ needs.detect.outputs.enable_trufflehog == 'true' }}
      enable_dependency_review: ${{ needs.detect.outputs.enable_dependency_review == 'true' }}
      enable_license_scan: ${{ needs.detect.outputs.enable_license_scan == 'true' }}
      enable_grype: ${{ needs.detect.outputs.enable_grype == 'true' }}
      enable_gitleaks: ${{ needs.detect.outputs.enable_gitleaks == 'true' }}
      enable_syft: ${{ needs.detect.outputs.enable_syft == 'true' }}

  ruby:
    needs: [detect]
    if: needs.detect.outputs.has_ruby == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/security-ruby.yaml
    with:
      pr_base_sha: ${{ inputs.pr_base_sha }}
      pr_head_sha: ${{ inputs.pr_head_sha }}
      runner_labels: ${{ needs.detect.outputs.runner_labels }}
      enable_rubocop: ${{ needs.detect.outputs.enable_rubocop == 'true' }}
      enable_bundler_audit: ${{ needs.detect.outputs.enable_bundler_audit == 'true' }}

  github-actions:
    needs: [detect]
    if: needs.detect.outputs.has_gha == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/security-github-actions.yaml
    with:
      pr_base_sha: ${{ inputs.pr_base_sha }}
      pr_head_sha: ${{ inputs.pr_head_sha }}
      runner_labels: ${{ needs.detect.outputs.runner_labels }}
      enable_zizmor: ${{ needs.detect.outputs.enable_zizmor == 'true' }}
      enable_poutine: ${{ needs.detect.outputs.enable_poutine == 'true' }}
      enable_actionlint: ${{ needs.detect.outputs.enable_actionlint == 'true' }}
      enable_exploit_guards: ${{ needs.detect.outputs.enable_exploit_guards == 'true' }}

  # ── Aggregate report ────────────────────────────────────────────────

  report:
    name: Aggregate Report
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    needs: [detect, go, rust, python, js, java, dotnet, rails, sql, powershell, iac, c, php, ruby, general, github-actions]
    # report must list every scanner job so it waits for all SARIF artifacts before aggregating.
    # Skipped jobs (languages not detected) resolve immediately and don't add real wait time.
    if: ${{ !cancelled() && inputs.enable_report && needs.detect.result == 'success' }}
    # !cancelled() overrides the default success() check (because it uses a status
    # check function), so the report still runs when scanner jobs fail.
    # detect must succeed because it bootstraps the rest of the workflow.
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit  # Logs outbound calls but does not block them.
                                # Switch to 'block' + allowed-endpoints for stricter isolation.

      - name: Verify scanner jobs completed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          # Check that at least one scanner job succeeded (not all skipped/failed)
          # This guards against fork PRs that crash every scanner
          SUCCEEDED=$(printf '%s' "$NEEDS_JSON" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          scanner_jobs = {k: v for k, v in needs.items() if k != 'detect'}
          succeeded = [k for k, v in scanner_jobs.items() if v['result'] == 'success']
          skipped = [k for k, v in scanner_jobs.items() if v['result'] == 'skipped']
          failed = [k for k, v in scanner_jobs.items() if v['result'] == 'failure']
          cancelled = [k for k, v in scanner_jobs.items() if v['result'] == 'cancelled']
          print(f'succeeded={len(succeeded)} skipped={len(skipped)} failed={len(failed)} cancelled={len(cancelled)}')
          if cancelled:
              print('WARNING: ' + str(len(cancelled)) + ' scanner(s) were cancelled: ' + ', '.join(cancelled))
          # If every non-skipped scanner failed or was cancelled, flag it
          non_skipped = [k for k, v in scanner_jobs.items() if v['result'] != 'skipped']
          if non_skipped and all(needs[k]['result'] in ('failure', 'cancelled') for k in non_skipped):
              print('WARNING: All scanners failed or were cancelled — results may be unreliable')
              with open('scanner_warning', 'w') as f:
                  f.write('true')
          ")
          echo "$SUCCEEDED"

      - name: Download all SARIF files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: '*-sarif*'

      - name: Validate artifact provenance
        run: |
          # Allowlist of expected SARIF artifact directory names.
          # Reject any artifact not in this list to prevent SARIF injection
          # from unexpected sources (e.g., concurrent workflow runs).
          # ⚠️ When adding a new scanner, add its artifact name here too.
          ALLOWED_ARTIFACTS="semgrep-sarif trivy-sarif trufflehog-sarif license-scan-sarif grype-sarif gitleaks-sarif gosec-sarif staticcheck-sarif govulncheck-sarif cargo-audit-sarif clippy-sarif bandit-sarif pip-audit-sarif npm-audit-sarif pmd-sarif brakeman-sarif sqlfluff-sarif tsqllint-sarif powershell-sarif checkov-sarif ansible-lint-sarif terraform-validate-sarif terraform-fmt-sarif tflint-sarif kube-linter-sarif hadolint-sarif kubescape-sarif flawfinder-sarif cppcheck-sarif secrets-c-sarif rubocop-sarif bundler-audit-sarif phpstan-sarif composer-audit-sarif zizmor-sarif poutine-sarif actionlint-sarif exploit-guards-sarif pluto-sarif"

          rejected=0
          for dir in */; do
            [ -d "$dir" ] || continue
            dirname="${dir%/}"
            # Allow dotnet-vulnerable-sarif-* (matrix produces versioned artifacts)
            if echo "$dirname" | grep -Fq 'dotnet-vulnerable-sarif-'; then
              continue
            fi
            if ! echo " $ALLOWED_ARTIFACTS " | grep -Fq " $dirname "; then
              echo "::warning::Rejecting unexpected SARIF artifact: $dirname"
              rm -rf "$dirname"
              rejected=$((rejected + 1))
            fi
          done
          if [ "$rejected" -gt 0 ]; then
            echo "::warning::Rejected $rejected unexpected artifact(s) from SARIF aggregation"
          fi

          # Warn if no SARIF artifacts were found (may indicate all scanners cancelled/failed silently)
          sarif_count=$(find . -maxdepth 2 -name '*.sarif' -o -name '*.sarif.json' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$sarif_count" -eq 0 ]; then
            echo "::warning::No SARIF artifacts found — scanners may have been cancelled or produced no output"
          else
            echo "Found $sarif_count SARIF file(s) for aggregation"
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Generate Summary
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python3 << 'EOF'
          import json
          import os

          MAX_COMMENT_SIZE = 60000  # Leave margin below GitHub's 65536 limit

          def sanitize_md(text):
              """Escape markdown characters that could enable content injection via SARIF fields."""
              if not isinstance(text, str):
                  return str(text)
              text = text.replace('\r\n', ' ').replace('\n', ' ').replace('\r', ' ')
              text = text.replace('|', '\\|')
              text = text.replace('[', '\\[').replace(']', '\\]')
              text = text.replace('<', '&lt;').replace('>', '&gt;')
              # Neutralize @mentions to prevent notification spam from attacker-crafted SARIF
              text = text.replace('@', '@\u200b')
              # Neutralize backtick injection that could break out of code spans or fences
              text = text.replace('`', '\\`')
              # Neutralize code fence breaks
              text = text.replace('~~~', '\\~\\~\\~')
              # Neutralize bold/italic/strikethrough formatting injection
              text = text.replace('*', '\\*')
              text = text.replace('_', '\\_')
              text = text.replace('~~', '\\~\\~')
              return text

          quarantined = []

          def validate_sarif_structure(filepath, sarif):
              """Validate SARIF conforms to expected structure."""
              if not isinstance(sarif, dict):
                  return False, "root is not an object"
              if sarif.get('version') not in ('2.1.0',):
                  return False, f"unsupported SARIF version: {sarif.get('version')}"
              runs = sarif.get('runs')
              if not isinstance(runs, list):
                  return False, "missing or invalid 'runs' array"
              for run in runs:
                  if not isinstance(run, dict):
                      return False, "run entry is not an object"
                  tool = run.get('tool')
                  if not isinstance(tool, dict):
                      return False, "run missing 'tool' object"
              return True, None

          def parse_sarif(filepath):
              try:
                  with open(filepath, 'r') as f:
                      sarif = json.load(f)
              except Exception as e:
                  quarantined.append(f"{filepath}: {e}")
                  print(f"::warning::Quarantined unparseable SARIF: {filepath} ({e})")
                  return None, {'error': 0, 'warning': 0, 'note': 0}, []

              valid, reason = validate_sarif_structure(filepath, sarif)
              if not valid:
                  quarantined.append(f"{filepath}: {reason}")
                  print(f"::warning::Quarantined malformed SARIF: {filepath} ({reason})")
                  return None, {'error': 0, 'warning': 0, 'note': 0}, []

              counts = {'error': 0, 'warning': 0, 'note': 0}
              tool_name = 'Unknown'
              findings = []

              for run in sarif.get('runs', []):
                  tool = run.get('tool') or {}
                  driver = tool.get('driver') or {}
                  run_name = driver.get('name', 'Unknown')
                  if tool_name == 'Unknown' and run_name != 'Unknown':
                      tool_name = run_name

                  for result in run.get('results', []):
                      level = result.get('level', 'warning')
                      if level in counts:
                          counts[level] += 1

                      rule_id = result.get('ruleId', 'unknown')
                      message = result.get('message', {}).get('text', 'No description')

                      location_info = 'unknown location'
                      if result.get('locations'):
                          phys_loc = result['locations'][0].get('physicalLocation', {})
                          file_path = phys_loc.get('artifactLocation', {}).get('uri', 'unknown')
                          region = phys_loc.get('region', {})
                          start_line = region.get('startLine', 0)
                          start_col = region.get('startColumn', 0)

                          if start_line and start_col:
                              location_info = f"{file_path}:{start_line}:{start_col}"
                          elif start_line:
                              location_info = f"{file_path}:{start_line}"
                          else:
                              location_info = file_path

                      findings.append({
                          'level': level,
                          'rule': rule_id,
                          'message': message,
                          'location': location_info,
                          'package': result.get('properties', {}).get('package'),
                          'version': result.get('properties', {}).get('version'),
                          'advisory': result.get('properties', {}).get('advisory')
                      })

              return tool_name, counts, findings

          sarif_files = []
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.sarif'):
                      sarif_files.append(os.path.join(root, file))

          all_findings = {}

          for filepath in sarif_files:
              tool_name, counts, findings = parse_sarif(filepath)
              if tool_name and tool_name != 'Unknown':
                  all_findings.setdefault(tool_name, []).extend(findings)

          results = {}
          for tool_name, findings in all_findings.items():
              if tool_name == 'dotnet-vulnerable-packages':
                  deduped = []
                  seen = set()
                  for finding in findings:
                      key = (
                          finding['location'],
                          finding.get('package'),
                          finding.get('version'),
                          finding.get('advisory'),
                          finding['level'],
                      )
                      if key in seen:
                          continue
                      seen.add(key)
                      deduped.append(finding)
                  all_findings[tool_name] = deduped

              counts = {'error': 0, 'warning': 0, 'note': 0}
              for finding in all_findings[tool_name]:
                  level = finding['level']
                  if level in counts:
                      counts[level] += 1
              results[tool_name] = counts

          # Check if all scanners failed (fork PR protection)
          scanner_warning = os.path.exists('scanner_warning')

          total_findings = 0
          summary = "## 🔒 Security Scan Summary\n\n"

          if scanner_warning:
              summary += "⚠️ **Warning**: All scanner jobs failed. Results may be unreliable — review the [workflow run](${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}}) for details.\n\n"

          if os.environ.get('GITHUB_ACTOR') == 'dependabot[bot]':
              summary += "> ℹ️ **Note**: Semgrep ran with a reduced security-only ruleset for this Dependabot PR.\n\n"

          if results:
              summary += "| Tool | 🔴 High | 🟠 Medium | 🔵 Low | Total |\n"
              summary += "|------|---------|-----------|--------|-------|\n"

              grand_total = {'error': 0, 'warning': 0, 'note': 0}

              for tool in sorted(results.keys()):
                  counts = results[tool]
                  total = sum(counts.values())
                  summary += f"| {sanitize_md(tool)} | {counts['error']} | {counts['warning']} | {counts['note']} | **{total}** |\n"

                  for level in grand_total:
                      grand_total[level] += counts[level]

              total_findings = sum(grand_total.values())
              summary += f"| **Total** | **{grand_total['error']}** | **{grand_total['warning']}** | **{grand_total['note']}** | **{total_findings}** |\n\n"

              if grand_total['error'] > 0:
                  summary += "🔴 **Action Required**: High severity findings detected\n\n"
              elif grand_total['warning'] > 0:
                  summary += "🟠 **Review Recommended**: Medium severity findings detected\n\n"
              else:
                  summary += "✅ **No critical issues found**\n\n"

              # Add detailed findings (limit to top 5 per tool to stay within size limit)
              details = "<details>\n<summary>📋 Detailed Findings (Click to expand)</summary>\n\n"

              for tool in sorted(all_findings.keys()):
                  findings = all_findings[tool]
                  high_findings = [f for f in findings if f['level'] == 'error']

                  if high_findings:
                      details += f"\n### {sanitize_md(tool)}\n\n"

                      for finding in high_findings[:5]:
                          details += f"- **{sanitize_md(finding['rule'])}**: {sanitize_md(finding['message'])}\n"
                          details += f"  - 📍 `{sanitize_md(finding['location'])}`\n"

                      if len(high_findings) > 5:
                          details += f"\n*...and {len(high_findings) - 5} more high severity findings*\n"

              details += "\n</details>\n"

              # Only include details if within size limit
              if len(summary) + len(details) < MAX_COMMENT_SIZE:
                  summary += details

              summary += f"\n---\n"
              summary += f"[View Full Scan Results](${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}})\n"
          elif sarif_files:
              summary += "✅ No security findings detected in scanned code.\n"
          elif scanner_warning:
              summary += "⚠️ All scanner jobs failed to produce valid results. Review the [workflow run](${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}}) for details.\n"
          else:
              summary += "No scanners produced results for this run.\n"

          # Final size guard — truncate at line boundary to avoid breaking markdown tables
          if len(summary) > MAX_COMMENT_SIZE:
              truncated = summary[:MAX_COMMENT_SIZE - 200]
              last_newline = truncated.rfind('\n')
              if last_newline > MAX_COMMENT_SIZE - 500:
                  truncated = truncated[:last_newline]
              summary = truncated + f"\n\n---\n*Truncated: {total_findings} total findings across {len(results)} tools. See full results in the workflow run.*\n"

          with open('security-summary.md', 'w') as f:
              f.write(summary)

          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              f.write(summary)

          print(summary)
          EOF

      - name: Merge SARIF for Code Scanning
        if: ${{ inputs.enable_code_scanning_upload }}
        run: |
          python3 << 'EOF'
          import json, os

          sarif_files = []
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.sarif'):
                      sarif_files.append(os.path.join(root, file))

          if not sarif_files:
              print("No SARIF files to merge for Code Scanning upload")
              with open('merged.sarif', 'w') as f:
                  json.dump({"version": "2.1.0", "runs": []}, f)
          else:
              merged = {"$schema": "https://json.schemastore.org/sarif-2.1.0.json", "version": "2.1.0", "runs": []}
              for filepath in sarif_files:
                  try:
                      with open(filepath) as f:
                          data = json.load(f)
                      merged["runs"].extend(data.get("runs", []))
                  except (json.JSONDecodeError, KeyError):
                      print(f"::warning::Skipping malformed SARIF file: {filepath}")
              with open('merged.sarif', 'w') as f:
                  json.dump(merged, f, indent=2)
              print(f"Merged {len(sarif_files)} SARIF files with {len(merged['runs'])} runs")
          EOF

      - name: Upload to Code Scanning
        if: ${{ inputs.enable_code_scanning_upload }}
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          sarif_file: merged.sarif
          category: security-scanner
        continue-on-error: true

      - name: Post PR comment
        if: ${{ inputs.enable_pr_comment && github.event.pull_request.number && !github.event.pull_request.head.repo.fork }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            let summary = fs.readFileSync('security-summary.md', 'utf8');
            // Marker lets us find and update our existing comment on re-runs
            // instead of posting a new one each time. Don't use this marker
            // in manually-written PR comments or they'll be overwritten.
            const marker = '<!-- security-scan-summary -->';

            // Final size guard for GitHub API limit
            const MAX_SIZE = 65536;
            let body = `${marker}\n${summary}`;
            if (body.length > MAX_SIZE) {
              body = body.substring(0, MAX_SIZE - 100) + '\n\n*... truncated due to GitHub comment size limit.*';
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Require both marker match AND author match to prevent comment hijacking.
            // Only update comments posted by github-actions[bot] or the current actor.
            const allowedAuthors = ['github-actions[bot]', context.actor];
            const existing = comments.find(c =>
              c.body.includes(marker) &&
              allowedAuthors.includes(c.user.login)
            );

            if (comments.some(c => c.body.includes(marker) && !allowedAuthors.includes(c.user.login))) {
              core.warning('Found security-scan-summary marker in a comment by an unexpected author — skipping update to prevent comment hijacking');
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
