name: Go Security
on:
  workflow_call:
    inputs:
      pr_base_sha:
        type: string
      pr_head_sha:
        type: string
      runner_labels:
        type: string
        default: '"ubuntu-24.04"'
      enable_gosec:
        type: boolean
        default: true
      enable_staticcheck:
        type: boolean
        default: true
      enable_govulncheck:
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  gosec:
    name: Gosec (Go Security)
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # NOTE: GitHub Actions has no step-level sharing across jobs, so this detection
      # step is intentionally duplicated for each job in this workflow. Update all
      # copies when the detection logic changes.
      # Uses inline bash rather than the collect-paths composite action because it
      # must resolve go.mod/go.work version fields and workspace roots — logic that
      # exceeds what collect-paths's regex filter supports.
      - name: Check for changed Go files
        id: check_go
        env:
          PR_BASE_SHA: ${{ inputs.pr_base_sha }}
          PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
        run: |
          GO_VERSION_FILE=$(find . -name 'go.work' -not -path './.git/*' | sort | head -n 1)
          if [ -z "$GO_VERSION_FILE" ]; then
            # In multi-module monorepos, pick the go.mod with the highest Go version
            # so the installed toolchain satisfies all modules in the workspace.
            GO_VERSION_FILE=$(
              find . -name 'go.mod' -not -path './.git/*' -print0 \
              | xargs -0 awk "/^go [0-9]/ {print FILENAME, \$2}" \
              | sort -t' ' -k2 -V -r \
              | head -n 1 \
              | cut -d' ' -f1
            )
            # Fallback: if awk/sort found nothing (e.g. empty go directive), pick any go.mod.
            if [ -z "$GO_VERSION_FILE" ]; then
              GO_VERSION_FILE=$(find . -name 'go.mod' -not -path './.git/*' | sort | head -n 1)
            fi
          fi
          if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
            if [ -n "$GO_VERSION_FILE" ]; then
              echo "has_go=true" >> "$GITHUB_OUTPUT"
              echo "go_version_file=${GO_VERSION_FILE#./}" >> "$GITHUB_OUTPUT"
              echo "No PR context — discovered Go module files"
            else
              echo "has_go=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No go.mod found — GOPATH-mode and vendored-only repositories are not supported"
            fi
            exit 0
          fi
          DIFF_FILES=$(git diff --name-only --diff-filter=d "$PR_BASE_SHA" "$PR_HEAD_SHA") || {
            echo "::warning::git diff failed — PR base SHA may be stale (force-push?). Falling back to tracked files."
            DIFF_FILES=$(git ls-files)
          }
          CHANGED_FILES=$(echo "$DIFF_FILES" | grep -E '\.go$|go\.mod$|go\.sum$|go\.work$|go\.work\.sum$' || echo "")

          if [ -n "$CHANGED_FILES" ] && [ -n "$GO_VERSION_FILE" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
            echo "go_version_file=${GO_VERSION_FILE#./}" >> "$GITHUB_OUTPUT"
            echo "Go files changed:"
            echo "$CHANGED_FILES"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "No Go files changed in this PR"
          fi

      - name: Gosec disabled
        if: steps.check_go.outputs.has_go == 'true' && !inputs.enable_gosec
        run: |
          echo '::notice title=Tool Disabled::Gosec is disabled. Set enable_gosec: true to re-enable.'

      - name: Set up Go
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_gosec
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ steps.check_go.outputs.go_version_file }}
          cache: true

      - name: Prepare Go workspace
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_gosec
        run: |
          set -euo pipefail
          if [ -f "go.mod" ] || [ -f "go.work" ]; then
            echo "Root Go workspace already present"
            exit 0
          fi

          find . -name 'go.mod' -not -path './.git/*' -exec dirname {} \; | sort -u > go-module-dirs.txt
          if [ ! -s go-module-dirs.txt ]; then
            echo "No Go modules discovered for temporary workspace"
            exit 0
          fi

          echo "Creating temporary go.work for discovered submodules"
          xargs -d '\n' go work init < go-module-dirs.txt

      - name: Run Gosec
        id: run_gosec
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_gosec
        continue-on-error: true
        run: |
          # Retry loop guards against transient module proxy or network failures.
          for i in 1 2 3; do
            go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0 && break
            [ "$i" -lt 3 ] || { echo "::error::Failed to install Gosec after 3 attempts"; exit 1; }
            echo "Attempt $i/3 failed, retrying in 10s..."
            sleep 10
          done
          gosec -fmt sarif -out gosec.sarif -stdout -verbose=text ./...

      - name: Check Gosec result
        if: steps.run_gosec.outcome == 'failure'
        run: echo "::warning title=Gosec::Gosec exited non-zero — results may be incomplete"

      - name: Validate Gosec SARIF
        if: always() && steps.check_go.outputs.has_go == 'true' && inputs.enable_gosec
        run: |
          set -euo pipefail
          [ -s gosec.sarif ] || { echo "::error::gosec.sarif was not generated. Scanner did not produce output — check install and run steps above."; exit 1; }
          python3 -c "import json; data=json.load(open('gosec.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::gosec produced {n} finding(s)' if n else '::notice::gosec completed with no findings')"

      - name: Upload SARIF
        if: always() && steps.check_go.outputs.has_go == 'true' && inputs.enable_gosec
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 7

  staticcheck:
    name: Staticcheck (Go Linting)
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
