        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ steps.check_go.outputs.go_version_file }}
          cache: true

      - name: Prepare Go workspace
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_staticcheck
        run: |
          set -euo pipefail
          if [ -f "go.mod" ] || [ -f "go.work" ]; then
            echo "Root Go workspace already present"
            exit 0
          fi

          find . -name 'go.mod' -not -path './.git/*' -exec dirname {} \; | sort -u > go-module-dirs.txt
          if [ ! -s go-module-dirs.txt ]; then
            echo "No Go modules discovered for temporary workspace"
            exit 0
          fi

          echo "Creating temporary go.work for discovered submodules"
          xargs -d '\n' go work init < go-module-dirs.txt

      - name: Run Staticcheck
        id: run_staticcheck
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_staticcheck
        continue-on-error: true
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1.4.1
        with:
          version: "2026.1"
          install-go: false
          output-format: sarif
          output-file: staticcheck.sarif

      - name: Check Staticcheck result
        if: steps.run_staticcheck.outcome == 'failure'
        run: echo "::warning title=Staticcheck::Staticcheck exited non-zero — results may be incomplete"

