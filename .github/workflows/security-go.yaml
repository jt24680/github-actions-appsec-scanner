          python3 -c "import json; data=json.load(open('staticcheck.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::staticcheck produced {n} finding(s)' if n else '::notice::staticcheck completed with no findings')"

      - name: Upload SARIF
        if: always() && steps.check_go.outputs.has_go == 'true' && inputs.enable_staticcheck
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staticcheck-sarif
          path: staticcheck.sarif
          retention-days: 7

  govulncheck:
    name: Govulncheck (Go Vulnerabilities)
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # NOTE: GitHub Actions has no step-level sharing across jobs, so this detection
      # step is intentionally duplicated for each job in this workflow. Update all
      # copies when the detection logic changes.
      # Uses inline bash rather than the collect-paths composite action because it
      # must resolve go.mod/go.work version fields and workspace roots — logic that
      # exceeds what collect-paths's regex filter supports.
      - name: Check for changed Go files
        id: check_go
        env:
          PR_BASE_SHA: ${{ inputs.pr_base_sha }}
          PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
        run: |
          GO_VERSION_FILE=$(find . -name 'go.work' -not -path './.git/*' | sort | head -n 1)
          if [ -z "$GO_VERSION_FILE" ]; then
            # In multi-module monorepos, pick the go.mod with the highest Go version
            # so the installed toolchain satisfies all modules in the workspace.
            GO_VERSION_FILE=$(
              find . -name 'go.mod' -not -path './.git/*' -print0 \
              | xargs -0 awk "/^go [0-9]/ {print FILENAME, \$2}" \
              | sort -t' ' -k2 -V -r \
              | head -n 1 \
              | cut -d' ' -f1
            )
            # Fallback: if awk/sort found nothing (e.g. empty go directive), pick any go.mod.
            if [ -z "$GO_VERSION_FILE" ]; then
              GO_VERSION_FILE=$(find . -name 'go.mod' -not -path './.git/*' | sort | head -n 1)
            fi
          fi
          if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
            if [ -n "$GO_VERSION_FILE" ]; then
              echo "has_go=true" >> "$GITHUB_OUTPUT"
              echo "go_version_file=${GO_VERSION_FILE#./}" >> "$GITHUB_OUTPUT"
              echo "No PR context — discovered Go module files"
            else
              echo "has_go=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No go.mod found — GOPATH-mode and vendored-only repositories are not supported"
            fi
            exit 0
          fi
          DIFF_FILES=$(git diff --name-only --diff-filter=d "$PR_BASE_SHA" "$PR_HEAD_SHA") || {
            echo "::warning::git diff failed — PR base SHA may be stale (force-push?). Falling back to tracked files."
            DIFF_FILES=$(git ls-files)
          }
          CHANGED_FILES=$(echo "$DIFF_FILES" | grep -E '\.go$|go\.mod$|go\.sum$|go\.work$|go\.work\.sum$' || echo "")

          if [ -n "$CHANGED_FILES" ] && [ -n "$GO_VERSION_FILE" ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
            echo "go_version_file=${GO_VERSION_FILE#./}" >> "$GITHUB_OUTPUT"
            echo "Go files changed:"
            echo "$CHANGED_FILES"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "No Go files changed in this PR"
          fi

      - name: Govulncheck disabled
        if: steps.check_go.outputs.has_go == 'true' && !inputs.enable_govulncheck
        run: |
          echo '::notice title=Tool Disabled::Govulncheck is disabled. Set enable_govulncheck: true to re-enable.'

      - name: Set up Go
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ steps.check_go.outputs.go_version_file }}
          cache: true

      - name: Prepare Go workspace
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        run: |
          set -euo pipefail
          if [ -f "go.mod" ] || [ -f "go.work" ]; then
            echo "Root Go workspace already present"
            exit 0
          fi

          find . -name 'go.mod' -not -path './.git/*' -exec dirname {} \; | sort -u > go-module-dirs.txt
          if [ ! -s go-module-dirs.txt ]; then
            echo "No Go modules discovered for temporary workspace"
            exit 0
          fi

          echo "Creating temporary go.work for discovered submodules"
          xargs -d '\n' go work init < go-module-dirs.txt

      - name: Install govulncheck
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        run: |
          for i in 1 2 3; do
            go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && break
            [ "$i" -lt 3 ] || { echo "::error::Failed to install govulncheck after 3 attempts"; exit 1; }
            echo "Attempt $i/3 failed, retrying in 10s..."
            sleep 10
          done

      - name: Run govulncheck
        id: run_govulncheck
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        continue-on-error: true
        run: |
          govulncheck -json ./... > govulncheck.json

      - name: Check govulncheck result
        if: steps.run_govulncheck.outcome == 'failure'
        run: echo "::warning title=govulncheck::govulncheck exited non-zero — results may be incomplete"

      - name: Set up Python
        if: steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Convert to SARIF
        if: always() && steps.run_govulncheck.outcome != 'failure' && steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        run: |
          python3 << 'EOF'
          import json
          import sys

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "govulncheck",
                          "version": "1.1.4",
                          "informationUri": "https://pkg.go.dev/golang.org/x/vuln/cmd/govulncheck"
                      }
                  },
                  "results": []
              }]
          }

          try:
              osv_entries = {}
              findings = []
              skipped = 0

              with open('govulncheck.json', 'r') as f:
                  for line in f:
                      try:
                          msg = json.loads(line.strip())
                      except Exception:
                          skipped += 1
                          continue

                      if 'osv' in msg:
                          entry = msg['osv']
                          osv_entries[entry.get('id', '')] = entry

                      if 'finding' in msg:
                          findings.append(msg['finding'])

              if skipped:
                  print(f"::warning::{skipped} malformed entries skipped during SARIF conversion", file=sys.stderr)

              for finding in findings:
                  osv_id = finding.get('osv', 'unknown')
                  osv = osv_entries.get(osv_id, {})
                  summary = osv.get('summary', 'Vulnerable dependency detected')
                  aliases = osv.get('aliases', [])
                  cve = next((a for a in aliases if a.startswith('CVE-')), osv_id)

                  # Extract the trace to find the affected module/package
                  trace = finding.get('trace', [])
                  module_name = trace[0].get('module', 'unknown') if trace else 'unknown'
                  version = trace[0].get('version', 'unknown') if trace else 'unknown'

                  # Find a source file from the trace
                  source_file = 'go.mod'
                  source_line = 1
                  for frame in trace:
                      if 'position' in frame:
                          pos = frame['position']
                          source_file = pos.get('filename', source_file)
                          source_line = pos.get('line', source_line)
                          break

                  message = f"{cve}: {summary} (module: {module_name}@{version})"

                  # Extract severity from OSV database_specific or CVSS score
                  severity_map = {'LOW': 'note', 'MODERATE': 'warning', 'MEDIUM': 'warning', 'HIGH': 'error', 'CRITICAL': 'error'}
                  db_severity = osv.get('database_specific', {}).get('severity', '').upper()
                  level = severity_map.get(db_severity, '')
                  if not level:
                      # CVSS fallback
                      for sev in osv.get('severity', []):
                          try:
                              # OSV stores CVSS vector strings (e.g. "CVSS:3.1/AV:N/..."), not
                              # plain numbers. float() will raise ValueError on vectors — that's
                              # fine; we just skip them and fall through to level = 'error'.
                              score = float(sev.get('score', ''))
                              level = 'error' if score >= 7.0 else ('warning' if score >= 4.0 else 'note')
                              break
                          except (ValueError, AttributeError, TypeError):
                              pass
                  if not level:
                      level = 'error'

                  result = {
                      "ruleId": osv_id,
                      "level": level,
                      "message": {"text": message},
                      "locations": [{
                          "physicalLocation": {
                              "artifactLocation": {"uri": source_file},
                              "region": {"startLine": source_line}
                          }
                      }]
                  }
                  sarif["runs"][0]["results"].append(result)
          except Exception as e:
              raise SystemExit(f"Error processing govulncheck results: {e}")

          with open('govulncheck.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          EOF

      - name: Validate Govulncheck SARIF
        if: always() && steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        run: |
          set -euo pipefail
          [ -s govulncheck.sarif ] || { echo "::error::govulncheck.sarif was not generated. Scanner did not produce output — check install and run steps above."; exit 1; }
          python3 -c "import json; data=json.load(open('govulncheck.sarif')); assert isinstance(data.get('runs'), list); n=sum(len(r.get('results',[])) for r in data['runs']); print(f'::notice::govulncheck produced {n} finding(s)' if n else '::notice::govulncheck completed with no findings')"

      - name: Upload SARIF
        if: always() && steps.check_go.outputs.has_go == 'true' && inputs.enable_govulncheck
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: govulncheck-sarif
          path: govulncheck.sarif
          retention-days: 7
